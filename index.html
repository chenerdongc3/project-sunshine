<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TinderTI测试</title>
  <meta name="description" content="SBTI已经过时，请选择你的亚文化。">
  <link rel="icon" type="image/x-icon" href="&quot;data:image/svg+xml,&lt;svg"><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
  <meta property="og:title" content="TinderTI测试">
  <meta name="twitter:title" content="TinderTI测试">
  <meta property="og:description" content="SBTI已经过时，请选择你的亚文化。">
  <meta name="twitter:description" content="SBTI已经过时，请选择你的亚文化。">
  <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/660cad39-bb6b-4ee6-bd51-18228aeed7f8/id-preview-c292ad7e--7864929e-8d64-48dc-b701-c73cb49b73a7.lovable.app-1775849188227.png">
  <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/660cad39-bb6b-4ee6-bd51-18228aeed7f8/id-preview-c292ad7e--7864929e-8d64-48dc-b701-c73cb49b73a7.lovable.app-1775849188227.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta property="og:type" content="website">
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <h1 class="intro-title" id="intro-title">TinderTI测试</h1>
        <button id="btn-start" class="btn btn-primary btn-start">开始测试</button>
        <p class="intro-credit" id="intro-credit">Bryant Chen改编<br/>灵感@氧化镁Magne<br/></p>
        <p class="intro-note" id="intro-note">本测试仅供娱乐</p>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 31</div>
        <div class="question-area">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">
        <div class="result-kicker" id="result-kicker">你的主类型</div>
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-image-wrap" id="result-image-wrap" style="display:none">
          <img class="result-image" id="result-image" alt="" />
        </div>
        <div class="result-badge" id="result-badge"></div>
        <div class="result-intro" id="result-intro"></div>
        <div class="result-desc" id="result-desc"></div>

        <div class="result-secondary" id="result-secondary" style="display:none">
          <div class="secondary-label">次要匹配</div>
          <div class="secondary-info" id="secondary-info"></div>
        </div>

        <h3 class="section-title">十五维度评分</h3>
        <canvas id="radar-chart" width="320" height="320"></canvas>
        <div class="dimensions-detail" id="dimensions-detail"></div>

        <div class="result-top3">
          <h3 class="section-title">最佳匹配 TOP 5</h3>
          <div id="top-list"></div>
        </div>

        <div class="disclaimer" id="disclaimer"></div>

        <div class="result-actions">
          <button id="btn-download" class="btn btn-primary">保存分享图片</button>
          <button id="btn-restart" class="btn btn-secondary">重新测试</button>
        </div>

        <div class="agent-section">
          <p class="agent-title">想自己搭一个？</p>
          <div class="agent-cmd">
            <code>git clone https://github.com/pingfanfan/SBTI.git && cd SBTI && npm install && npm run dev</code>
          </div>
          <button id="btn-agent" class="btn btn-agent">复制一键部署命令</button>
          <p class="agent-hint">粘贴到 Claude Code / OpenClaw 即可一键运行并自定义</p>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
